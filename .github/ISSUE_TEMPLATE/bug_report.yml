name: "🐛 Bug Report"
description: "Report a bug to help us improve OnGrid"
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below as accurately as possible to help us diagnose and resolve the issue.
  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      placeholder: "Provide a clear and concise description of the bug."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      placeholder: "A clear and concise description of what you expected to happen."
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: "Environment & Device Details"
      placeholder: |
        - OS: [e.g. iOS 17, Android 14, Windows 11]
        - Browser: [e.g. Safari Mobile, Chrome Mobile, Chrome Desktop]
        - Version: [e.g. Chrome 120]
        - Connection: [e.g. College WiFi, Mobile Data]
    validations:
      required: true
  - type: textarea
    id: telemetry
    attributes:
      label: "Sensor Telemetry / Console Logs"
      placeholder: "Paste any console logs, Prisma logs, or sensor readings from the Check-In screen here (if applicable)."
    validations:
      required: false
  - type: checkboxes
    id: checkmarks
    attributes:
      label: "Checklist"
      options:
        - label: "I have searched existing issues to ensure this is not a duplicate."
          required: true
        - label: "I am using the latest version of the repository."
          required: true
