name: "🚀 Feature Request"
description: "Suggest a new feature or improvement for OnGrid"
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make OnGrid better? Tell us about it! We are open to all suggestions.
  - type: textarea
    id: problem
    attributes:
      label: "Is your feature request related to a problem?"
      placeholder: "A clear and concise description of what the problem or limitation is. (e.g., I'm frustrated when...)"
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: "Describe the Proposed Solution"
      placeholder: "Provide a clear and concise description of what you want to happen and how it should work."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Describe Alternatives Considered"
      placeholder: "A clear and concise description of any alternative solutions or features you've considered."
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      placeholder: "Add any other context, mockups, screenshots, or user flows here."
    validations:
      required: false
  - type: checkboxes
    id: checkmarks
    attributes:
      label: "Checklist"
      options:
        - label: "I have searched existing issues/discussions to see if this has already been requested."
          required: true
